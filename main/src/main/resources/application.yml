# ============================================================================
#  Core Integration — aviation order & reservation aggregator
# ============================================================================

server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: core-integration
  mvc:
    problemdetails:
      enabled: true

# ---------------------------------------------------------------------------
# Provider configuration
# Each adapter and client is conditionally registered via
# @ConditionalOnProperty(prefix = "providers.<id>", name = "enabled", havingValue = "true").
# Setting a provider's `enabled` flag to false removes it from the application
# context entirely.
# ---------------------------------------------------------------------------
providers:
  travelport:
    enabled: true
    base-url: https://api.travelport.com/universal
    branch-code: ${TRAVELPORT_BRANCH_CODE:P7777777}
    username: ${TRAVELPORT_USERNAME:}
    password: ${TRAVELPORT_PASSWORD:}
    connection-timeout-ms: 5000
    read-timeout-ms: 30000

  amadeus:
    enabled: true
    base-url: https://api.amadeus.com/v2
    client-id: ${AMADEUS_CLIENT_ID:}
    client-secret: ${AMADEUS_CLIENT_SECRET:}
    connection-timeout-ms: 5000
    read-timeout-ms: 30000

# ---------------------------------------------------------------------------
# Spring Boot Actuator
# ---------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level:
    com.core.service: INFO
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

# ---------------------------------------------------------------------------
# API key authentication
# ---------------------------------------------------------------------------
# The API key is read from `api.key`, which binds from the API_KEY environment
# variable (or this property). Every HTTP endpoint is protected and must present
# the key in the configured header (default: X-API-KEY). Override API_KEY in
# production — the value below is a local development placeholder only.
#
# Public allow-list (no key required): /actuator/health, /actuator/info, /error
# ---------------------------------------------------------------------------
api:
  key: ${API_KEY:dev-only-change-me}
  header-name: ${API_HEADER_NAME:X-API-KEY}
