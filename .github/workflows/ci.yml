name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          check-latest: true
          cache: maven

      - name: Build & test
        run: mvn -B -ntp verify

      - name: Upload bootable jar
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: core-integration-jar
          path: main/target/*.jar
          if-no-files-found: error
          retention-days: 14
